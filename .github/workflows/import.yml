name: Import JSON

on:
  workflow_dispatch:
    inputs:
      site:
        description: "Site ID (ex: lepiondor, site-jeux-jouets)"
        required: true
      type:
        description: "products | articles | all"
        default: "all"

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate required secrets
        run: |
          missing=0
          for key in DATABASE_URL DIRECT_URL MEILISEARCH_HOST MEILISEARCH_API_KEY REVALIDATE_SECRET REVALIDATE_BASE_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}
      - run: pnpm --filter @affiliate/db exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - run: pnpm pipeline import --site ${{ inputs.site }} --type ${{ inputs.type }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          REVALIDATE_BASE_URL: ${{ secrets.REVALIDATE_BASE_URL }}
