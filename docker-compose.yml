# Postgres + Meilisearch locaux (site Next + pipeline).
# Démarre : pnpm db:up
# Postgres : postgresql://affiliate:affiliate@localhost:5432/affiliate
# Meilisearch : MEILISEARCH_HOST=http://127.0.0.1:7700 et MEILISEARCH_API_KEY (voir ci-dessous)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: affiliate
      POSTGRES_PASSWORD: affiliate
      POSTGRES_DB: affiliate
    ports:
      - "5432:5432"
    volumes:
      - affiliate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliate -d affiliate"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-dev_meili_master_key}"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - affiliate_meili_data:/meili_data

volumes:
  affiliate_pgdata:
  affiliate_meili_data:
